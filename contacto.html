<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - ColdMax</title>
</head>
<body>
    <header>
        <h1>ColdMax</h1>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h2>Contacto</h2>
        <p>Telefono: +54 431127</p>
        <p>Email: ventas@coldmax.com</p>
        <p>Direccion: Av. San Martin 466, Ciudad</p>

        <form action="#" method="post">
            <p>
                <label for="nombre">Nombre:</label><br>
                <input type="text" id="nombre" name="nombre" required minlength="2">
            </p>
            <p>
                <label for="email">Email:</label><br>
                <input type="email" id="email" name="email" required>
            </p>
            <p>
                <label for="mensaje">Mensaje:</label><br>
                <textarea id="mensaje" name="mensaje" rows="5" required minlength="10"></textarea>
            </p>
            <p>
                <button type="submit">Enviar</button>
            </p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 ColdMax. Todos los derechos reservados.</p>
    </footer>
</body>
</html>
